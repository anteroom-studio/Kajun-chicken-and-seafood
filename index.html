<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kajun Chicken & Seafood — Authentic Cajun cuisine across Ontario. Bold flavors. Louisiana soul. 100% Halal." />
    <meta name="theme-color" content="#080808" />
    <title>KAJUN CHICKEN & SEAFOOD</title>
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Premium fonts: Antonio (cinematic display) + Syne (futuristic) + Mulish (clean body) -->
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@100;300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Mulish:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <style>
      /* Prevent FOUC */
      html { background: #080808; }
      #root { opacity: 0; transition: opacity 0.4s ease; }
      #root.ready { opacity: 1; }
    </style>
  <script>
    // GitHub Pages SPA fallback — only fires when hosted on github.io.
    // On other hosts (Vercel, custom domain) the rewrite handles routing
    // and this script must not prepend the GH Pages base path.
    (function() {
      if (!/\.github\.io$/.test(location.hostname)) return;
      var redirect = sessionStorage.getItem('spa_redirect');
      if (redirect && redirect !== '/') {
        sessionStorage.removeItem('spa_redirect');
        window.history.replaceState(null, null, '/Kajun-chicken-and-seafood' + redirect);
      }
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
